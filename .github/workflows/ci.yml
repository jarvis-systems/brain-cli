name: CI

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/**'

jobs:
  quality-gates:
    name: Quality Gates (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Configure private package access
        run: composer config --global github-oauth.github.com ${{ secrets.COMPOSER_GITHUB_TOKEN }}

      - name: Composer lock sync guard
        run: |
          composer validate --no-check-publish
          composer install --no-interaction --prefer-dist --no-progress
          if ! git diff --exit-code composer.lock; then
            echo "::error::composer.lock is out of sync with composer.json. Run 'composer update' locally and commit the lock file."
            exit 1
          fi

      - name: Private repo availability guard
        run: |
          if ! composer show jarvis-brain/core --no-interaction 2>/dev/null; then
            echo "::error::Cannot resolve jarvis-brain/core. Check: (1) repositories VCS block in composer.json, (2) COMPOSER_GITHUB_TOKEN secret has read access."
            exit 1
          fi
          echo "jarvis-brain/core: $(composer show jarvis-brain/core --no-interaction 2>/dev/null | head -1)"

      - name: PHPStan
        run: composer analyse

      - name: PHPUnit
        run: composer test

      - name: Security audit
        run: composer audit
